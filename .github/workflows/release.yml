name: release

# publish trustmebro to npm on a v* tag, gated on the test suite passing first.
# auth = npm Trusted Publishing (OIDC) , no stored token. requires the per-package trusted publisher
# to be configured on npmjs.com (this repo + this workflow file) for BOTH names: `trustmebro` and
# `@royashbrook/trustmebro`. published version = package.json's version, so bump package.json + the
# script's VERSION together, then tag the matching v<version>.
on:
  push:
    tags: ["v*"]

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: npm >= 11.5.1 (trusted publishing / OIDC)
        run: npm install -g npm@latest
      - name: test
        run: |
          chmod +x trustmebro test/test.sh
          ./test/test.sh
      - name: publish (bare + @royashbrook scope, same code from one tag, via OIDC)
        run: |
          npm publish --access public
          npm pkg set name=@royashbrook/trustmebro
          npm publish --access public
